# Nginx config cho FruitShop — đặt tại /etc/nginx/sites-available/fruitshop
# Sau đó: ln -s /etc/nginx/sites-available/fruitshop /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

# ── Upstream — 2 PM2 workers ─────────────────────────────
upstream fruitshop {
    server 127.0.0.1:3000;

    # Keepalive: giữ connection đến Node.js thay vì tạo mới mỗi request
    # → giảm TCP handshake overhead đáng kể ở 125 req/s
    keepalive 32;
}

# ── Gzip tại Nginx (nhanh hơn Node.js compression) ───────
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;          # 1-9, 5 là balance tốt nhất
gzip_min_length   1000;       # không nén file < 1KB
gzip_types
    text/plain text/css text/javascript
    application/javascript application/json
    text/html application/xml;

server {
    listen 80;
    server_name _;             # thay bằng domain thật nếu có

    # ── Static files — Nginx phục vụ trực tiếp ───────────
    # Node.js KHÔNG bị gọi cho CSS/JS/ảnh → giải phóng hoàn toàn
    location ~* \.(css|js|png|jpg|jpeg|webp|ico|woff|woff2|svg)$ {
        root /root/NCCFOODS_V2/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;        # không log static files → giảm I/O
    }

    # ── Upload files ──────────────────────────────────────
    location /uploads/ {
        root /root/NCCFOODS_V2/public;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── App requests → Node.js ────────────────────────────
    location / {
        proxy_pass         http://fruitshop;
        proxy_http_version 1.1;

        # Keepalive headers
        proxy_set_header Connection "";

        # Forward real IP cho rate limiter
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Host            $host;

        # Timeouts
        proxy_connect_timeout  5s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Buffer — tránh Node.js bị block chờ client chậm
        proxy_buffering         on;
        proxy_buffer_size       4k;
        proxy_buffers           8 4k;
    }

    # ── Security headers ──────────────────────────────────
    add_header X-Content-Type-Options  "nosniff";
    add_header X-Frame-Options         "SAMEORIGIN";
    add_header Referrer-Policy         "no-referrer-when-downgrade";

    # ── Ẩn version Nginx ──────────────────────────────────
    server_tokens off;

    # ── Client body limit (upload bill ảnh) ──────────────
    client_max_body_size 6M;
}
